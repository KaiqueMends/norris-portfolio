<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050506"/>
      <stop offset="55%" stop-color="#0B0B10"/>
      <stop offset="100%" stop-color="#050506"/>
    </linearGradient>
    <radialGradient id="lime" cx="30%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#A3FF12" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#A3FF12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="papaya" cx="78%" cy="70%" r="65%">
